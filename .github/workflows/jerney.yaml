name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write   # IMPORTANT FIX
  id-token: write

env:
  REGISTRY: ghcr.io
  OWNER: harshithgowda45

jobs:

# ======================================================
# 1. LINT
# ======================================================
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint
        working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint || true

# ======================================================
# 2. BUILD & PUSH (FIXED GHCR)
# ======================================================
  build:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        include:
          - component: backend
            image: jerney-backend
          - component: frontend
            image: jerney-frontend

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
          platforms: linux/amd64
          provenance: false

# ======================================================
# 3. SECURITY SCAN (TRIVY)
# ======================================================
  image-scan:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        image:
          - jerney-backend
          - jerney-frontend

    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/harshithgowda45/${{ matrix.image }}:latest
          severity: HIGH,CRITICAL
          exit-code: 1

# ======================================================
# 4. UPDATE K8s MANIFEST (FIXED)
# ======================================================
  update-manifest:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Update Backend Image
        run: |
          sed -i "s|image: .*jerney-backend.*|image: ghcr.io/harshithgowda45/jerney-backend:${GITHUB_SHA}|g" k8s/backend/*.yaml

      - name: Update Frontend Image
        run: |
          sed -i "s|image: .*jerney-frontend.*|image: ghcr.io/harshithgowda45/jerney-frontend:${GITHUB_SHA}|g" k8s/frontend/*.yaml

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/
          git commit -m "update image tags ${GITHUB_SHA}" || echo "No changes"
          git push
