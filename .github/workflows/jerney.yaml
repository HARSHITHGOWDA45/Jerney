name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/harshithgowda45/jerney-backend
  FRONTEND_IMAGE: ghcr.io/harshithgowda45/jerney-frontend

jobs:

# ======================================================
# 1. LINT
# ======================================================
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Lint
        working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint || true

# ======================================================
# 2. SCA (Security Scan)
# ======================================================
  sca:
    name: 🛡️ Dependency Scan
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit
        working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm audit --audit-level=high || true

# ======================================================
# 3. BUILD & PUSH TO GHCR (FIXED)
# ======================================================
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: sca

    strategy:
      matrix:
        component: [backend, frontend]

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image
        id: vars
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            echo "IMAGE=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT
          fi

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          provenance: false

# ======================================================
# 4. IMAGE SCAN (TRIVY)
# ======================================================
  image-scan:
    name: 🔬 Image Scan
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t scan-${{ matrix.component }} ./${{ matrix.component }}

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-${{ matrix.component }}
          severity: HIGH,CRITICAL
          exit-code: 1

# ======================================================
# 5. IaC SCAN (CHECKOV)
# ======================================================
  iac-scan:
    name: 🏗️ IaC Scan
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true

# ======================================================
# 6. DOCKERFILE LINT
# ======================================================
  dockerfile-lint:
    name: 📋 Dockerfile Lint
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile

# ======================================================
# 7. UPDATE K8S MANIFEST (FIXED FOR YOUR STRUCTURE)
# ======================================================
  update-manifest:
    name: 🚀 Update K8s Manifest
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Get SHA Tag
        id: sha
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Backend update
      - name: Update Backend Manifest
        run: |
          TAG=${{ steps.sha.outputs.tag }}
          sed -i "s|image: .*jerney-backend.*|image: ${BACKEND_IMAGE}:${TAG}|g" k8s/backend/*.yaml

      # Frontend update
      - name: Update Frontend Manifest
        run: |
          TAG=${{ steps.sha.outputs.tag }}
          sed -i "s|image: .*jerney-frontend.*|image: ${FRONTEND_IMAGE}:${TAG}|g" k8s/frontend/*.yaml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/
          git commit -m "update k8s image tags ${{ steps.sha.outputs.tag }}" || echo "No changes"
          git push
