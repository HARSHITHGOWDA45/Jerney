# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline
# ==============================================================
name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/harshithgowda45/jerney-backend
  FRONTEND_IMAGE: ghcr.io/harshithgowda45/jerney-frontend

# ==============================================================
# STAGE 1: LINT
# ==============================================================
jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run Lint
        working-directory: ${{ matrix.component }}
        run: npm run lint


# ==============================================================
# STAGE 2: SCA (Dependency Scan)
# ==============================================================
  sca:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true


# ==============================================================
# STAGE 3: BUILD & PUSH TO GHCR
# ==============================================================
  build:
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/harshithgowda45/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ==============================================================
# STAGE 4: TRIVY SCAN
# ==============================================================
  image-scan:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t jerney-${{ matrix.component }}:scan ./${{ matrix.component }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: jerney-${{ matrix.component }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


# ==============================================================
# STAGE 5: IAC SCAN (CHECKOV)
# ==============================================================
  iac-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Checkov - Kubernetes
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true


# ==============================================================
# STAGE 6: DOCKERFILE LINT
# ==============================================================
  dockerfile-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile


# ==============================================================
# STAGE 7: UPDATE K8s MANIFESTS
# ==============================================================
  update-manifest:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update Backend manifest
        run: |
          TAG=${{ steps.sha.outputs.short }}
          sed -i "s|image: .*jerney-backend.*|image: ${BACKEND_IMAGE}:${TAG}|" k8s/backend/*.yaml

      - name: Update Frontend manifest
        run: |
          TAG=${{ steps.sha.outputs.short }}
          sed -i "s|image: .*jerney-frontend.*|image: ${FRONTEND_IMAGE}:${TAG}|" k8s/frontend/*.yaml

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --cached --quiet || git commit -m "ci: update k8s images ${{ steps.sha.outputs.short }} [skip ci]"
          git push
