name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/harshithgowda45/jerney-backend
  FRONTEND_IMAGE: ghcr.io/harshithgowda45/jerney-frontend

jobs:

# ==============================================================
# 1. LINT
# ==============================================================
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm run lint

# ==============================================================
# 2. SCA (Dependency Scan)
# ==============================================================
  sca:
    name: 🛡️ Dependency Audit
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - working-directory: ${{ matrix.component }}
        run: |
          npm ci
          npm audit --audit-level=high || true

# ==============================================================
# 3. BUILD & PUSH TO GHCR
# ==============================================================
  build:
    name: 🐳 Build & Push ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: sca

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name
        id: vars
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            echo "IMAGE=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT
          fi

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ==============================================================
# 4. IMAGE SCAN (TRIVY)
# ==============================================================
  image-scan:
    name: 🔬 Scan Image
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t jerney-${{ matrix.component }}:scan ./${{ matrix.component }}

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: jerney-${{ matrix.component }}:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

# ==============================================================
# 5. IaC SCAN (CHECKOV)
# ==============================================================
  iac-scan:
    name: 🏗️ IaC Scan
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true

# ==============================================================
# 6. DOCKERFILE LINT
# ==============================================================
  dockerfile-lint:
    name: 📋 Dockerfile Lint
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile

# ==============================================================
# 7. UPDATE K8S MANIFEST
# ==============================================================
  update-manifest:
    name: 🚀 Update K8s Manifest
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get Commit SHA
        id: sha
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update Manifest
        run: |
          TAG=${{ steps.sha.outputs.tag }}

          sed -i "s|image: .*jerney-backend.*|image: ${BACKEND_IMAGE}:${TAG}|g" k8s/jerney.yaml
          sed -i "s|image: .*jerney-frontend.*|image: ${FRONTEND_IMAGE}:${TAG}|g" k8s/jerney.yaml

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/jerney.yaml
          git commit -m "Update image tags to ${{ steps.sha.outputs.tag }}" || echo "No changes"
          git push
